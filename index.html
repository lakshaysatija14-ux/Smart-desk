<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Desk</title>

<style>
body {
  background: #0b0c10;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 50px;
}

.card {
  background: #1a1b28;
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  width: 300px;
}

button {
  margin-top: 10px;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>SMART DESK</h1>

<!-- QUOTE -->
<div class="card">
  <h3>Daily Inspiration</h3>
  <p class="quote">Loading...</p>
  <p class="author"></p>
  <button class="refresh-btn">Refresh</button>
</div>

<!-- WEATHER -->
<div class="card">
  <h3>Weather</h3>
  <p id="city">Rajpura</p>
  <p id="temp">--°C</p>
  <p id="desc">Loading...</p>
  <p>Humidity: <span id="humidity">--%</span></p>
  <p>Wind: <span id="wind">--</span></p>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // ===== QUOTE =====
  async function fetchQuote() {
    try {
      const res = await fetch("https://api.api-ninjas.com/v1/quotes", {
        headers: {
          "X-Api-Key": "HjkBfzqgzWK5KYYTE1E5lFqcTSp68Xrom3I0gBD9"
        }
      });

      const data = await res.json();

      document.querySelector(".quote").innerText = `"${data[0].quote}"`;
      document.querySelector(".author").innerText = `— ${data[0].author}`;

    } catch (err) {
      document.querySelector(".quote").innerText = "Quote failed 😢";
    }
  }

  // ===== WEATHER =====
  async function fetchWeather() {
    try {
      const res = await fetch(
        "https://api.openweathermap.org/data/2.5/weather?q=Rajpura&appid=8669018300070c64718b01069c69bee7&units=metric"
      );

      const data = await res.json();

      document.getElementById("temp").innerText = Math.round(data.main.temp) + "°C";
      document.getElementById("desc").innerText = data.weather[0].description;
      document.getElementById("humidity").innerText = data.main.humidity + "%";
      document.getElementById("wind").innerText = data.wind.speed + " km/h";

    } catch (err) {
      document.getElementById("desc").innerText = "Weather failed";
    }
  }

  // RUN
  fetchQuote();
  fetchWeather();

  // BUTTON
  document.querySelector(".refresh-btn").addEventListener("click", fetchQuote);

});
</script>

</body>
</html>
